name: jrfvhub
description: "A new Flutter project."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ================= API =================
  http: ^1.2.1
  dio: ^5.4.0

  # ================= STATE =================
  get: ^4.6.6

  socket_io_client: ^3.1.2
  intl: ^0.20.2

  # ================= STORAGE =================
  shared_preferences: ^2.2.2
  
  font_awesome_flutter: ^11.0.0

  # ================= UI =================
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  flutter_spinkit: ^5.2.1

  # ================= CHART =================
  fl_chart: ^0.68.0

  # ================= FIREBASE =================
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

  syncfusion_flutter_signaturepad: ^28.2.12
  mobile_scanner: ^7.1.3
  qr_flutter: ^4.1.0
  pretty_qr_code: ^3.4.0

  file_picker: ^10.3.2
  open_filex: ^4.7.0
  record:
  just_audio:
  path: ^1.9.1

  # ============ Location ==================
  geolocator: ^14.0.2
  geocoding: ^4.0.0  

  # ================= DEVICE =================
  device_info_plus: ^11.0.0
  package_info_plus: ^8.0.2

  # ================= IMAGE =================
  image_picker: ^1.1.2

  # ================= PDF =================
  syncfusion_flutter_pdfviewer: ^28.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# ================= APP ICON =================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/jrfpvhub.png
    - assets/images/jupiter.png
    - assets/images/logo1.png
